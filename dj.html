<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Panel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap');

:root {
  --bg: #0e0e0e;
  --surface: #181818;
  --surface2: #222;
  --border: #2e2e2e;
  --gold: #FFBA08;
  --red: #e24b4a;
  --green: #1DB954;
  --text: #f0f0f0;
  --muted: #888;
  --radius: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'FC SaveSpace Rounded', 'Sarabun', sans-serif;
  min-height: 100vh;
}

/* ===== LOGIN ===== */
#loginScreen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.login-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px 32px;
  width: 100%; max-width: 360px;
  text-align: center;
}
.login-icon {
  width: 56px; height: 56px;
  background: #1a1500;
  border: 1px solid #3a2f00;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
}
.login-icon svg { width: 28px; height: 28px; color: var(--gold); }
.login-box h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.login-box p { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

.pw-wrap { position: relative; }
.pw-wrap input {
  width: 100%;
  background: #111;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 16px;
  font-family: inherit;
  padding: 11px 42px 11px 14px;
  outline: none;
  text-align: center;
  letter-spacing: 3px;
  transition: border-color 0.2s;
}
.pw-wrap input:focus { border-color: var(--gold); }
.pw-toggle {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--muted); cursor: pointer; padding: 0;
}
.pw-toggle svg { width: 18px; height: 18px; display: block; }

.btn-login {
  width: 100%; padding: 12px;
  background: var(--gold); color: #111;
  border: none; border-radius: 8px;
  font-size: 14px; font-weight: 700;
  font-family: inherit;
  cursor: pointer; margin-top: 12px;
  transition: opacity 0.2s, transform 0.1s;
}
.btn-login:hover { opacity: 0.88; }
.btn-login:active { transform: scale(0.98); }

.err-msg {
  font-size: 12px; color: var(--red);
  margin-top: 10px; min-height: 18px;
}

/* ===== DJ PANEL ===== */
#djPanel { display: none; }

nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px;
  background: #0a0a0a;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.logo { font-size: 17px; font-weight: 700; color: var(--gold); display: flex; align-items: center; gap: 8px; }
.logo svg { width: 20px; height: 20px; }
.dj-badge {
  font-size: 11px; font-weight: 700;
  background: #1a1500; border: 1px solid #3a2f00;
  color: var(--gold); padding: 3px 10px; border-radius: 20px;
}
.nav-right { display: flex; align-items: center; gap: 10px; }
.dj-link {
  font-size: 12px; font-weight: 700; font-family: inherit;
  color: var(--muted); background: transparent;
  border: 1px solid #333; border-radius: 7px;
  padding: 6px 13px; cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  text-decoration: none; transition: all 0.2s;
}
.dj-link svg { width: 13px; height: 13px; }
.dj-link:hover { border-color: var(--gold); color: var(--gold); }
.btn-logout {
  font-size: 12px; color: var(--muted);
  background: none; border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 12px;
  cursor: pointer; font-family: inherit;
  transition: all 0.2s;
}
.btn-logout:hover { color: var(--red); border-color: var(--red); }

.container { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }

.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px; text-align: center;
}
.stat-num { font-size: 28px; font-weight: 700; color: var(--gold); }
.stat-label { font-size: 11px; color: var(--muted); margin-top: 3px; }

.section-title {
  font-size: 13px; font-weight: 700; color: var(--gold);
  display: flex; align-items: center; gap: 8px;
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 12px;
}
.section-title svg { width:16px;height:16px; }

.filter-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.filter-btn {
  font-size: 12px; font-family: inherit;
  padding: 5px 14px; border-radius: 20px;
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); cursor: pointer;
  transition: all 0.2s;
}
.filter-btn.active { background: var(--gold); color: #111; border-color: var(--gold); font-weight: 700; }
.filter-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }

.queue-empty {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px; text-align: center;
  color: var(--muted); font-size: 14px;
}
.queue-empty svg { width:28px;height:28px;margin-bottom:10px;display:block;margin-inline:auto; }

.queue-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px;
  transition: border-color 0.2s, opacity 0.2s;
}
.queue-item.playing { border-color: var(--green); background: #0d1f12; }
.queue-item.done { opacity: 0.35; }

.q-num {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--gold); color: #111;
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.q-num.done-num { background: var(--surface2); color: var(--muted); }
.q-num.play-num { background: var(--green); color: #000; }

.q-info { flex: 1; min-width: 0; }
.q-song { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.q-by { font-size: 12px; color: var(--muted); margin-top: 2px; }
.q-note { font-size: 12px; color: #aaa; font-style: italic; margin-top: 2px; }
.badge {
  font-size: 10px; font-weight: 700; padding: 2px 7px;
  border-radius: 4px; margin-left: 6px; vertical-align: middle;
}
.badge-play { background: var(--green); color: #000; }
.badge-done { background: var(--gold); color: #111; }

.q-actions { display: flex; gap: 5px; flex-shrink: 0; }
.iBtn {
  width: 32px; height: 32px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 6px; color: var(--muted);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
}
.iBtn svg { width: 15px; height: 15px; }
.iBtn:hover { border-color: var(--gold); color: var(--gold); }
.iBtn.del:hover { border-color: var(--red); color: var(--red); }
.iBtn.play-btn:hover { border-color: var(--green); color: var(--green); }
.iBtn:disabled { opacity: 0.2; pointer-events: none; }

.clear-done-btn {
  font-size: 12px; font-family: inherit;
  padding: 6px 14px; border-radius: 6px;
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); cursor: pointer;
  transition: all 0.2s; margin-left: auto; display: block;
  margin-bottom: 12px;
}
.clear-done-btn:hover { border-color: var(--red); color: var(--red); }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--gold); color: #111;
  font-size: 13px; font-weight: 700;
  padding: 10px 22px; border-radius: 8px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s; z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h2>Song queuing</h2>
    <p>ใส่รหัสเพื่อเข้าสู่หน้าจัดการคิว</p>
    <div class="pw-wrap">
      <input type="password" id="pwInput" placeholder="รหัสผ่าน" onkeydown="if(event.key==='Enter')doLogin()" />
      <button class="pw-toggle" onclick="togglePw()" tabindex="-1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    <button class="btn-login" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="err-msg" id="errMsg"></div>
  </div>
</div>

<!-- DJ PANEL -->
<div id="djPanel">
  <nav>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="18" r="3"/><circle cx="15" cy="15" r="3"/><path d="M12 18V9l4-2"/></svg>
      Song Request
    </div>
    <div class="nav-right">
      <a href="index.html" class="dj-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Request song
      </a>
      <span class="dj-badge">🎛 DJ Mode</span>
      <button class="btn-logout" onclick="doLogout()">ออกจากระบบ</button>
    </div>
  </nav>

  <div class="container">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">คำขอทั้งหมด</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statWait" style="color:#f0f0f0;">0</div>
        <div class="stat-label">รอเล่น</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statDone" style="color:#1DB954;">0</div>
        <div class="stat-label">เล่นแล้ว</div>
      </div>
    </div>

    <div class="section-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      จัดการคิวเพลง
    </div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">ทั้งหมด</button>
      <button class="filter-btn" onclick="setFilter('waiting', this)">รอเล่น</button>
      <button class="filter-btn" onclick="setFilter('playing', this)">กำลังเล่น</button>
      <button class="filter-btn" onclick="setFilter('done', this)">เล่นแล้ว</button>
      <button class="clear-done-btn" onclick="clearDone()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:-2px;margin-right:4px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        ลบที่เล่นแล้วทั้งหมด
      </button>
    </div>

    <div id="queueList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL  = 'https://stkkstseygitcsuikfui.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0a2tzdHNleWdpdGNzdWlrZnVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NjIxNTgsImV4cCI6MjA5NTAzODE1OH0.Aj76hJ347VbNiucm77k3Z3HIkyn1vhtkHiJKQR3iyqo';
const DJ_PASSWORD   = '09090909';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

let queue = [];
let currentFilter = 'all';
let realtimeChannel = null;

// ─── Auth ───────────────────────────────────────────────────
function togglePw() {
  const inp = document.getElementById('pwInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function doLogin() {
  const pw  = document.getElementById('pwInput').value;
  const err = document.getElementById('errMsg');
  if (pw === DJ_PASSWORD) {
    sessionStorage.setItem('dj_auth', '1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('djPanel').style.display = 'block';
    startDJ();
  } else {
    err.textContent = '❌ รหัสผ่านไม่ถูกต้อง';
    document.getElementById('pwInput').value = '';
    setTimeout(() => err.textContent = '', 3000);
  }
}

function doLogout() {
  sessionStorage.removeItem('dj_auth');
  if (realtimeChannel) db.removeChannel(realtimeChannel);
  document.getElementById('djPanel').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pwInput').value = '';
}

if (sessionStorage.getItem('dj_auth') === '1') {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('djPanel').style.display = 'block';
  startDJ();
}

// ─── Start DJ session ────────────────────────────────────────
function startDJ() {
  loadQueue();
  realtimeChannel = db.channel('dj_queue_channel')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'song_requests' }, () => {
      loadQueue();
    })
    .subscribe();
}

// ─── Load ────────────────────────────────────────────────────
async function loadQueue() {
  const { data, error } = await db
    .from('song_requests')
    .select('*')
    .order('sort_order', { ascending: true })
    .order('ts', { ascending: true });

  if (error) { console.error(error); return; }
  queue = data || [];
  renderAll();
}

// ─── Actions ─────────────────────────────────────────────────
async function markPlaying(id) {
  // ปิด playing เก่าทุกอัน แล้ว toggle อันที่เลือก
  const current = queue.find(x => x.id === id);
  const newStatus = current.status === 'playing' ? 'waiting' : 'playing';

  // reset อันที่ playing อยู่ก่อน
  const playingIds = queue.filter(x => x.status === 'playing' && x.id !== id).map(x => x.id);
  for (const pid of playingIds) {
    await db.from('song_requests').update({ status: 'waiting' }).eq('id', pid);
  }
  await db.from('song_requests').update({ status: newStatus }).eq('id', id);
  showToast('▶ ตั้งค่าสถานะแล้ว');
}

async function markDone(id) {
  const current = queue.find(x => x.id === id);
  const newStatus = current.status === 'done' ? 'waiting' : 'done';
  await db.from('song_requests').update({ status: newStatus }).eq('id', id);
  showToast('✓ เล่นเสร็จแล้ว');
}

async function moveUp(id) {
  // หา waiting items เรียงตาม sort_order
  const waiting = queue
    .filter(x => x.status !== 'done')
    .sort((a, b) => a.sort_order - b.sort_order);
  const i = waiting.findIndex(x => x.id === id);
  if (i <= 0) return;

  const a = waiting[i];
  const b = waiting[i - 1];
  // สลับ sort_order
  await db.from('song_requests').update({ sort_order: b.sort_order }).eq('id', a.id);
  await db.from('song_requests').update({ sort_order: a.sort_order }).eq('id', b.id);
}

async function moveDown(id) {
  const waiting = queue
    .filter(x => x.status !== 'done')
    .sort((a, b) => a.sort_order - b.sort_order);
  const i = waiting.findIndex(x => x.id === id);
  if (i < 0 || i >= waiting.length - 1) return;

  const a = waiting[i];
  const b = waiting[i + 1];
  await db.from('song_requests').update({ sort_order: b.sort_order }).eq('id', a.id);
  await db.from('song_requests').update({ sort_order: a.sort_order }).eq('id', b.id);
}

async function removeItem(id) {
  await db.from('song_requests').delete().eq('id', id);
  showToast('🗑 ลบออกจากคิวแล้ว');
}

async function clearDone() {
  const doneIds = queue.filter(x => x.status === 'done').map(x => x.id);
  if (!doneIds.length) return;
  await db.from('song_requests').delete().in('id', doneIds);
  showToast('🗑 ลบที่เล่นแล้วทั้งหมด');
}

// ─── Filter ──────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

// ─── Render ──────────────────────────────────────────────────
function renderAll() {
  const total = queue.length;
  const done  = queue.filter(x => x.status === 'done').length;
  const wait  = queue.filter(x => x.status !== 'done').length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statWait').textContent  = wait;
  document.getElementById('statDone').textContent  = done;

  const sorted = [...queue].sort((a, b) => {
    const rank = s => s === 'playing' ? 0 : s === 'done' ? 2 : 1;
    if (rank(a.status) !== rank(b.status)) return rank(a.status) - rank(b.status);
    return a.sort_order - b.sort_order;
  });

  const filtered = currentFilter === 'all' ? sorted : sorted.filter(x => x.status === currentFilter);
  const list = document.getElementById('queueList');

  if (!filtered.length) {
    list.innerHTML = `<div class="queue-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      ไม่มีรายการในหมวดนี้
    </div>`;
    return;
  }

  const waitOnly = sorted.filter(x => x.status !== 'done');
  list.innerHTML = filtered.map((item) => {
    const waitIdx  = waitOnly.findIndex(x => x.id === item.id);
    const numLabel = item.status === 'done' ? '✓' : item.status === 'playing' ? '▶' : waitIdx + 1;
    const numClass = item.status === 'done' ? 'done-num' : item.status === 'playing' ? 'play-num' : '';
    const isDone   = item.status === 'done';
    const isFirst  = waitIdx === 0;
    const isLast   = waitIdx === waitOnly.length - 1;

    return `<div class="queue-item ${item.status === 'playing' ? 'playing' : ''} ${isDone ? 'done' : ''}">
      <div class="q-num ${numClass}">${numLabel}</div>
      <div class="q-info">
        <div class="q-song">${escHtml(item.song)}
          ${item.status === 'playing' ? '<span class="badge badge-play">▶ กำลังเล่น</span>' : ''}
          ${isDone ? '<span class="badge badge-done">เล่นแล้ว</span>' : ''}
        </div>
        <div class="q-by">ขอโดย ${escHtml(item.name || 'ไม่ระบุชื่อ')} · ${formatDate(item.ts)}</div>
        ${item.note ? `<div class="q-note">"${escHtml(item.note)}"</div>` : ''}
      </div>
      <div class="q-actions">
        <button class="iBtn play-btn" onclick="markPlaying(${item.id})" title="${item.status === 'playing' ? 'หยุดเล่น' : 'เล่นเลย'}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${item.status === 'playing' ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>' : '<polygon points="5 3 19 12 5 21 5 3"/>'}</svg>
        </button>
        <button class="iBtn" onclick="markDone(${item.id})" title="${isDone ? 'ยังไม่เล่น' : 'เล่นแล้ว'}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
        <button class="iBtn" onclick="moveUp(${item.id})" title="เลื่อนขึ้น" ${isDone || isFirst ? 'disabled' : ''}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
        <button class="iBtn" onclick="moveDown(${item.id})" title="เลื่อนลง" ${isDone || isLast ? 'disabled' : ''}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <button class="iBtn del" onclick="removeItem(${item.id})" title="ลบ">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleString('th-TH', {
    day: 'numeric', month: 'short', year: '2-digit',
    hour: '2-digit', minute: '2-digit'
  });
}

</script>
